name: Build and Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          GODOT_VERSION="4.4-stable"
          GODOT_SHORT="4.4.stable"

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_SHORT}
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_SHORT}/

      - name: Build Web Export
        run: |
          TMPL=~/.local/share/godot/export_templates/4.4.stable

          godot --headless --import 2>&1 || true
          sleep 2

          mkdir -p build/web

          godot --headless --export-pack "Web" build/web/index.pck 2>&1

          mkdir -p /tmp/web_template
          unzip -o "$TMPL/web_nothreads_release.zip" -d /tmp/web_template/

          cp /tmp/web_template/godot.js build/web/index.js
          cp /tmp/web_template/godot.wasm build/web/index.wasm
          cp /tmp/web_template/godot.audio.worklet.js build/web/index.audio.worklet.js 2>/dev/null || true
          cp /tmp/web_template/godot.audio.position.worklet.js build/web/index.audio.position.worklet.js 2>/dev/null || true
          cp /tmp/web_template/godot.service.worker.js build/web/index.service.worker.js 2>/dev/null || true
          cp /tmp/web_template/godot.offline.html build/web/index.offline.html 2>/dev/null || true

          cat > build/web/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
            <title>Royal Puzzle 3</title>
            <style>
          html,body,#canvas{margin:0;padding:0;border:0}
          body{color:white;background-color:black;overflow:hidden;touch-action:none}
          #canvas{display:block}#canvas:focus{outline:none}
          #status,#status-splash,#status-progress{position:absolute;left:0;right:0}
          #status,#status-splash{top:0;bottom:0}
          #status{background-color:#202030;display:flex;flex-direction:column;justify-content:center;align-items:center;visibility:hidden}
          #status-progress,#status-notice{display:none}
          #status-progress{bottom:10%;width:50%;margin:0 auto}
          #status-notice{background-color:#5b3943;border-radius:.5rem;border:1px solid #9b3943;color:#e0e0e0;font-family:'Noto Sans',Arial,sans-serif;line-height:1.3;margin:0 2rem;overflow:hidden;padding:1rem;text-align:center;z-index:1}
            </style>
          </head>
          <body>
            <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
            <noscript>Your browser does not support JavaScript.</noscript>
            <div id="status">
              <progress id="status-progress"></progress>
              <div id="status-notice"></div>
            </div>
            <script src="index.js"></script>
            <script>
          const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{},"focusCanvas":true,"gdextensionLibs":[],"serviceWorker":"index.service.worker.js"};
          const GODOT_THREADS_ENABLED = false;
          const engine = new Engine(GODOT_CONFIG);
          (function(){
            const statusOverlay=document.getElementById('status');
            const statusProgress=document.getElementById('status-progress');
            const statusNotice=document.getElementById('status-notice');
            let initializing=true;let statusMode='';
            function setStatusMode(mode){if(statusMode===mode||!initializing)return;if(mode==='hidden'){statusOverlay.remove();initializing=false;return;}statusOverlay.style.visibility='visible';statusProgress.style.display=mode==='progress'?'block':'none';statusNotice.style.display=mode==='notice'?'block':'none';statusMode=mode;}
            function displayFailureNotice(err){console.error(err);if(err instanceof Error){statusNotice.textContent=err.message;}else{statusNotice.textContent=String(err);}setStatusMode('notice');initializing=false;}
            const missing=Engine.getMissingFeatures({threads:GODOT_THREADS_ENABLED});
            if(missing.length!==0){displayFailureNotice('Missing features: '+missing.join(', '));}
            else{setStatusMode('progress');engine.startGame({'onProgress':function(c,t){if(c>0&&t>0){statusProgress.value=c;statusProgress.max=t;}}}).then(()=>{setStatusMode('hidden');},displayFailureNotice);}
          }());
            </script>
          </body>
          </html>
          HTMLEOF

          cp vercel.json build/web/vercel.json
          ls -la build/web/

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          cd build/web
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
