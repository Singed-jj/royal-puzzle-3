name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          GODOT_VERSION="4.4-stable"
          GODOT_SHORT="4.4.stable"

          echo "=== Downloading Godot ==="
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot

          echo "=== Downloading export templates ==="
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -O templates.tpz

          echo "=== Installing templates ==="
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_SHORT}
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_SHORT}/

      - name: Build Web Export
        run: |
          TMPL=~/.local/share/godot/export_templates/4.4.stable

          echo "=== Importing project ==="
          godot --headless --import 2>&1 || true
          sleep 2

          mkdir -p build/web

          echo "=== Exporting pack ==="
          godot --headless --export-pack "Web" build/web/index.pck 2>&1

          echo "=== Unzipping web template ==="
          mkdir -p /tmp/web_template
          unzip -o "$TMPL/web_nothreads_release.zip" -d /tmp/web_template/

          # Copy template files with index. prefix
          cp /tmp/web_template/godot.js build/web/index.js
          cp /tmp/web_template/godot.wasm build/web/index.wasm
          cp /tmp/web_template/godot.audio.worklet.js build/web/index.audio.worklet.js 2>/dev/null || true
          cp /tmp/web_template/godot.audio.position.worklet.js build/web/index.audio.position.worklet.js 2>/dev/null || true
          cp /tmp/web_template/godot.service.worker.js build/web/index.service.worker.js 2>/dev/null || true
          cp /tmp/web_template/godot.offline.html build/web/index.offline.html 2>/dev/null || true

          # Use official HTML shell with prefix replacement
          sed 's/godot\./index\./g; s/\$GODOT_PROJECT_NAME/Royal Puzzle 3/g; s/\$GODOT_HEAD_INCLUDE//g' /tmp/web_template/godot.html > build/web/index.html

          echo "=== Build output ==="
          ls -la build/web/

      - name: Prepare site
        run: |
          mkdir -p _site
          cp build/web/index.* _site/
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
